<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление сайтом - Daniele</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Подключаем редактор кода CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <style>
        :root {
            --primary: #2d3748;
            --secondary: #4a5568;
            --accent: #ffd700;
            --light: #f7fafc;
            --success: #48bb78;
            --danger: #f56565;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            color: var(--light);
            line-height: 1.6;
        }

        /* Экран входа */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .login-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .login-subtitle {
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .form-group label {
            font-weight: bold;
            color: var(--accent);
        }

        .form-group input {
            padding: 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            transition: var(--transition);
            color: var(--primary);
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.5);
            transform: scale(1.02);
        }

        .login-btn {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #ffed4a;
            transform: scale(1.02);
        }

        .error-message {
            color: var(--danger);
            margin-top: 10px;
            display: none;
        }

        /* Основной контент */
        .admin-content {
            display: none;
            padding: 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .admin-title {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: var(--transition);
            margin-bottom: 20px;
        }

        .back-link:hover {
            transform: scale(1.05);
            background: #ffed4a;
        }

        /* Редактор кода */
        .editor-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .editor-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .editor-title h3 {
            color: var(--accent);
            font-size: 1.5rem;
        }

        .file-badge {
            background: var(--success);
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .editor-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--primary);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Поле для редактора */
        .CodeMirror {
            height: 500px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Статистика */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-number {
            font-size: 2rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            opacity: 0.8;
            font-size: 14px;
        }

        /* Файлы */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition);
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .file-card.active {
            border: 2px solid var(--accent);
        }

        .file-icon {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 15px;
            text-align: center;
        }

        .file-name {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 10px;
            text-align: center;
            word-break: break-all;
        }

        .file-info {
            font-size: 12px;
            opacity: 0.7;
            text-align: center;
            margin-bottom: 15px;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .logout-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .logout-btn:hover {
            transform: scale(1.05);
            background: #e53e3e;
        }

        .save-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .save-notification.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .editor-header {
                flex-direction: column;
                align-items: stretch;
            }
            
            .file-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Экран входа -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <div class="login-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="login-title">Доступ ограничен</h1>
            <p class="login-subtitle">Введите пароль для доступа к панели управления</p>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="password"><i class="fas fa-key"></i> Пароль:</label>
                    <input type="password" id="password" name="password" required placeholder="Введите пароль доступа">
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </form>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-triangle"></i> Неверный пароль!
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="admin-content" id="adminContent">
        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Выйти
        </button>

        <div class="admin-container">
            <div class="admin-header">
                <a href="index.html" class="back-link" target="_blank">
                    <i class="fas fa-arrow-left"></i> На сайт
                </a>
                <h1 class="admin-title">Редактор кода</h1>
                <p>Выберите файл для редактирования или создайте новый</p>
            </div>

            <!-- Статистика -->
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-number" id="totalVisits">0</div>
                    <div class="stat-label">Посещений</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="filesCount">2</div>
                    <div class="stat-label">Файлов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="lastEdit">-</div>
                    <div class="stat-label">Последнее изменение</div>
                </div>
            </div>

            <!-- Редактор кода -->
            <div class="editor-container" id="editorContainer" style="display: none;">
                <div class="editor-header">
                    <div class="editor-title">
                        <h3 id="currentFileName">Редактор</h3>
                        <span class="file-badge" id="fileStatus">Не сохранено</span>
                    </div>
                    <div class="editor-actions">
                        <button class="btn btn-secondary" onclick="closeEditor()">
                            <i class="fas fa-times"></i> Закрыть
                        </button>
                        <button class="btn btn-success" onclick="saveFile()" id="saveBtn">
                            <i class="fas fa-save"></i> Сохранить
                        </button>
                    </div>
                </div>
                <textarea id="codeEditor"></textarea>
            </div>

            <!-- Список файлов -->
            <div class="files-grid" id="filesList"></div>
        </div>
    </div>

    <!-- Уведомление о сохранении -->
    <div class="save-notification" id="saveNotification">
        <i class="fas fa-check-circle"></i> Файл сохранен!
    </div>

    <script>
        // ПАРОЛЬ ДОСТУПА - установи свой пароль
        const ADMIN_PASSWORD = "daniele123"; // 🔑 ЗАМЕНИ НА СВОЙ ПАРОЛЬ!

        // Хранилище файлов
        let files = {};
        let currentFile = null;
        let editor = null;
        let fileContents = {};

        // Загрузка файлов при старте
        function loadFiles() {
            // Загружаем сохраненные файлы из localStorage
            const saved = localStorage.getItem('siteFiles');
            if (saved) {
                files = JSON.parse(saved);
            } else {
                // Начальные файлы
                files = {
                    'index.html': {
                        name: 'index.html',
                        content: `<!DOCTYPE html>
<html>
<head>
    <title>Мой сайт</title>
</head>
<body>
    <h1>Привет, мир!</h1>
</body>
</html>`,
                        type: 'html',
                        created: new Date().toISOString()
                    },
                    'admin.html': {
                        name: 'admin.html',
                        content: document.documentElement.outerHTML,
                        type: 'html',
                        created: new Date().toISOString()
                    }
                };
                saveFiles();
            }
            renderFilesList();
        }

        // Сохранение файлов
        function saveFiles() {
            localStorage.setItem('siteFiles', JSON.stringify(files));
            updateStats();
        }

        // Отображение списка файлов
        function renderFilesList() {
            const container = document.getElementById('filesList');
            container.innerHTML = '';
            
            Object.values(files).forEach(file => {
                const card = document.createElement('div');
                card.className = `file-card ${currentFile === file.name ? 'active' : ''}`;
                
                const icon = file.name.endsWith('.html') ? 'fa-file-code' : 
                            file.name.endsWith('.css') ? 'fa-palette' : 
                            file.name.endsWith('.js') ? 'fa-code' : 'fa-file';
                
                const date = new Date(file.created).toLocaleString();
                
                card.innerHTML = `
                    <div class="file-icon">
                        <i class="fas ${icon}"></i>
                    </div>
                    <h3 class="file-name">${file.name}</h3>
                    <div class="file-info">Создан: ${date}</div>
                    <div class="file-actions">
                        <button class="btn btn-primary" onclick="editFile('${file.name}')">
                            <i class="fas fa-edit"></i> Редактировать
                        </button>
                        <button class="btn btn-secondary" onclick="previewFile('${file.name}')">
                            <i class="fas fa-eye"></i> Просмотр
                        </button>
                        <button class="btn btn-danger" onclick="deleteFile('${file.name}')">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Кнопка создания нового файла
            const newCard = document.createElement('div');
            newCard.className = 'file-card';
            newCard.innerHTML = `
                <div class="file-icon">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <h3 class="file-name">Новый файл</h3>
                <div class="file-info">Создайте новый HTML, CSS или JS файл</div>
                <div class="file-actions">
                    <button class="btn btn-success" onclick="createNewFile()">
                        <i class="fas fa-plus"></i> Создать
                    </button>
                </div>
            `;
            container.appendChild(newCard);
        }

        // Создание нового файла
        function createNewFile() {
            const name = prompt('Введите имя файла (например: style.css или script.js):');
            if (!name) return;
            
            if (files[name]) {
                alert('Файл с таким именем уже существует!');
                return;
            }

            let content = '';
            if (name.endsWith('.html')) {
                content = '<!DOCTYPE html>\n<html>\n<head>\n    <title>Новая страница</title>\n</head>\n<body>\n    \n</body>\n</html>';
            } else if (name.endsWith('.css')) {
                content = '/* Стили для сайта */\n\nbody {\n    margin: 0;\n    padding: 0;\n}';
            } else if (name.endsWith('.js')) {
                content = '// JavaScript код\n\nconsole.log("Скрипт загружен");';
            }

            files[name] = {
                name: name,
                content: content,
                type: name.split('.').pop(),
                created: new Date().toISOString()
            };
            
            saveFiles();
            renderFilesList();
            editFile(name);
        }

        // Редактирование файла
        function editFile(filename) {
            currentFile = filename;
            const file = files[filename];
            
            document.getElementById('editorContainer').style.display = 'block';
            document.getElementById('currentFileName').textContent = filename;
            
            if (!editor) {
                // Создаем редактор
                editor = CodeMirror.fromTextArea(document.getElementById('codeEditor'), {
                    lineNumbers: true,
                    mode: file.type === 'html' ? 'htmlmixed' : 
                          file.type === 'css' ? 'css' : 'javascript',
                    theme: 'monokai',
                    autoCloseTags: true,
                    autoCloseBrackets: true,
                    lineWrapping: true,
                    indentUnit: 4,
                    tabSize: 4
                });
                
                editor.on('change', function() {
                    document.getElementById('fileStatus').textContent = '⚠ Не сохранено';
                });
            } else {
                editor.setOption('mode', file.type === 'html' ? 'htmlmixed' : 
                                        file.type === 'css' ? 'css' : 'javascript');
            }
            
            editor.setValue(file.content);
            document.getElementById('fileStatus').textContent = '📝 Редактирование';
            
            // Прокрутка к редактору
            document.getElementById('editorContainer').scrollIntoView({ behavior: 'smooth' });
        }

        // Сохранение файла
        function saveFile() {
            if (!currentFile || !editor) return;
            
            const content = editor.getValue();
            files[currentFile].content = content;
            files[currentFile].modified = new Date().toISOString();
            
            saveFiles();
            
            // Показываем уведомление
            document.getElementById('fileStatus').textContent = '✓ Сохранено';
            const notification = document.getElementById('saveNotification');
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2000);
            
            // Обновляем статистику
            document.getElementById('lastEdit').textContent = new Date().toLocaleTimeString();
        }

        // Просмотр файла
        function previewFile(filename) {
            const file = files[filename];
            if (filename.endsWith('.html')) {
                // Открываем в новой вкладке
                const win = window.open('', '_blank');
                win.document.write(file.content);
            } else {
                alert('Предпросмотр доступен только для HTML файлов');
            }
        }

        // Удаление файла
        function deleteFile(filename) {
            if (filename === 'admin.html') {
                alert('Нельзя удалить файл админки!');
                return;
            }
            
            if (confirm(`Удалить файл ${filename}?`)) {
                delete files[filename];
                saveFiles();
                
                if (currentFile === filename) {
                    closeEditor();
                }
                
                renderFilesList();
            }
        }

        // Закрыть редактор
        function closeEditor() {
            document.getElementById('editorContainer').style.display = 'none';
            currentFile = null;
        }

        // Обновление статистики
        function updateStats() {
            document.getElementById('totalVisits').textContent = 
                localStorage.getItem('siteVisits') || '0';
            document.getElementById('filesCount').textContent = 
                Object.keys(files).length;
        }

        // Функции входа/выхода
        function checkAuth() {
            return localStorage.getItem('adminAuthenticated') === 'true';
        }

        function login(password) {
            if (password === ADMIN_PASSWORD) {
                localStorage.setItem('adminAuthenticated', 'true');
                showAdminPanel();
                return true;
            }
            return false;
        }

        function logout() {
            localStorage.removeItem('adminAuthenticated');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminContent').style.display = 'none';
        }

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadFiles();
            updateStats();
        }

        // Обработка входа
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            if (login(password)) {
                document.getElementById('errorMessage').style.display = 'none';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('password').value = '';
            }
        });

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuth()) {
                showAdminPanel();
            }
            
            // Счетчик посещений
            let visits = parseInt(localStorage.getItem('siteVisits') || '0');
            visits++;
            localStorage.setItem('siteVisits', visits.toString());
        });

        // Защита от копирования пароля
        document.addEventListener('contextmenu', function(e) {
            if (e.target.type === 'password') {
                e.preventDefault();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.target.type === 'password' && (e.ctrlKey || e.metaKey) && e.key === 'c') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
